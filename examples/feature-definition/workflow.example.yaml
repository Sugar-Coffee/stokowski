# =============================================================================
# Feature Definition Workflow (AI Collaboration)
# =============================================================================
#
# Multiple AI agents collaborate to define a feature:
#   PM Agent → Engineer Review → Architect Plan → Done
#
# Agents communicate through Linear comments on the issue.
# Each agent gets a fresh session for an independent perspective.
#
# Usage:
#   stokowski path/to/workflow.yaml
# =============================================================================

tracker:
  kind: linear
  project_slug: $LINEAR_PROJECT_SLUG
  api_key: $LINEAR_API_KEY

linear_states:
  todo: "Todo"
  active: "In Progress"
  review: "In Review"
  gate_approved: "Gate Approved"
  rework: "Rework"
  terminal:
    - Done
    - Canceled
    - Duplicate

polling:
  interval_ms: 20000

workspace:
  mode: worktree
  repo_path: ~/path/to/your/project     # <-- CHANGE THIS
  root: ~/path/to/your/project/.worktrees

hooks:
  timeout_ms: 60000

claude:
  permission_mode: auto
  model: claude-opus-4-6                # Opus for reasoning-heavy work
  max_turns: 15
  turn_timeout_ms: 3600000
  stall_timeout_ms: 300000
  append_system_prompt: >
    You are an autonomous agent collaborating with other AI agents to define
    a feature. Communicate findings and decisions by posting comments on the
    Linear issue. Read previous comments to understand what other agents have
    contributed. Be concise and actionable.

agent:
  max_concurrent_agents: 2
  max_retry_backoff_ms: 300000

prompts:
  global_prompt: prompts/global.md

server:
  port: 4201

# ---------------------------------------------------------------------------
# State machine — AI collaboration pipeline
# ---------------------------------------------------------------------------
states:

  # ── 1. PM defines the feature ──────────────────────────────────────────
  pm-define:
    type: agent
    prompt: prompts/pm-define.md
    linear_state: active
    model: claude-opus-4-6
    max_turns: 15
    session: inherit
    transitions:
      complete: engineer-evaluate

  # ── 2. Engineer evaluates feasibility ──────────────────────────────────
  engineer-evaluate:
    type: agent
    prompt: prompts/engineer-evaluate.md
    linear_state: active
    model: claude-opus-4-6
    max_turns: 10
    session: fresh                      # independent perspective
    transitions:
      complete: architect-plan

  # ── 3. Architect breaks into issues ────────────────────────────────────
  architect-plan:
    type: agent
    prompt: prompts/architect-plan.md
    linear_state: active
    model: claude-opus-4-6
    max_turns: 20
    session: fresh
    transitions:
      complete: done

  # ── 4. Done ────────────────────────────────────────────────────────────
  done:
    type: terminal
    linear_state: terminal
