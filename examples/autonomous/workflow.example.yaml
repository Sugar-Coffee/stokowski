# =============================================================================
# Autonomous Implementation Workflow (No Human Gates)
# =============================================================================
#
# Fully autonomous pipeline: implement → review → merge.
# No human gates. Agents make all decisions.
#
# Uses git worktrees for workspace isolation.
#
# Usage:
#   cd your-project
#   stokowski path/to/workflow.yaml
#
# Prerequisites:
#   - LINEAR_API_KEY and LINEAR_PROJECT_SLUG env vars
#   - gh CLI authenticated (for PR creation and merging)
#   - Claude Code CLI installed
# =============================================================================

# ---------------------------------------------------------------------------
# Tracker — set via env vars or replace with your values
# ---------------------------------------------------------------------------
tracker:
  kind: linear
  project_slug: $LINEAR_PROJECT_SLUG
  api_key: $LINEAR_API_KEY

# ---------------------------------------------------------------------------
# Linear state mapping — adjust names to match YOUR Linear workflow
# ---------------------------------------------------------------------------
linear_states:
  todo: "Todo"                          # issues picked up from here
  active: "In Progress"                 # moved here when agent starts
  review: "In Review"                   # used during PR review
  gate_approved: "Gate Approved"        # unused in this workflow
  rework: "Rework"                      # unused in this workflow
  terminal:
    - Done
    - Canceled
    - Duplicate

# ---------------------------------------------------------------------------
# Polling
# ---------------------------------------------------------------------------
polling:
  interval_ms: 15000                    # 15 seconds between ticks

# ---------------------------------------------------------------------------
# Workspace — git worktrees (recommended)
# ---------------------------------------------------------------------------
# Set mode to "worktree" and point repo_path to your project.
# Set mode to "clone" (default) to clone the repo per issue instead.
workspace:
  mode: worktree
  repo_path: ~/path/to/your/project     # <-- CHANGE THIS
  root: ~/path/to/your/project/.worktrees

# ---------------------------------------------------------------------------
# Hooks — run in the workspace directory
# ---------------------------------------------------------------------------
hooks:
  after_create: |
    # Install dependencies after creating a new worktree
    # Adjust for your package manager:
    npm install 2>/dev/null || pnpm install --frozen-lockfile 2>/dev/null || yarn install 2>/dev/null || true
  before_run: |
    git fetch origin main 2>/dev/null
    git rebase origin/main 2>/dev/null || git rebase --abort 2>/dev/null || true
  timeout_ms: 180000                    # 3 min for install

# ---------------------------------------------------------------------------
# Claude defaults
# ---------------------------------------------------------------------------
claude:
  permission_mode: auto
  model: claude-sonnet-4-6
  max_turns: 30
  turn_timeout_ms: 3600000              # 1 hour
  stall_timeout_ms: 300000              # 5 min with no output → kill
  append_system_prompt: >
    You are an autonomous coding agent. Work autonomously — do NOT use
    AskUserQuestion or pause for input. Make all decisions yourself.
    When unsure, pick the pragmatic option. Read CLAUDE.md for project
    conventions before starting.

# ---------------------------------------------------------------------------
# Agent concurrency
# ---------------------------------------------------------------------------
agent:
  max_concurrent_agents: 3
  max_retry_backoff_ms: 300000
  max_concurrent_agents_by_state:
    implement: 3
    triage: 4                           # triage is lightweight, allow many
    review-push: 1                      # serialize pushes to avoid conflicts
    fix-reviews: 1                      # serialize merges
  max_concurrent_by_project:            # per-project limits (prevents merge conflicts)
    implement: 1                        # 1 implement per project (3 projects = 3 parallel)
    review-push: 1                      # 1 push per project

# ---------------------------------------------------------------------------
# Prompts
# ---------------------------------------------------------------------------
prompts:
  global_prompt: prompts/global.md

# ---------------------------------------------------------------------------
# Webhook (optional — reacts instantly to Linear state changes)
# ---------------------------------------------------------------------------
# webhook:
#   secret: $LINEAR_WEBHOOK_SECRET        # HMAC-SHA256 secret from Linear

# ---------------------------------------------------------------------------
# Server (optional dashboard + webhook listener)
# ---------------------------------------------------------------------------
server:
  port: 4200

# ---------------------------------------------------------------------------
# State machine — fully autonomous, no gates
# ---------------------------------------------------------------------------
states:

  # ── 0. Triage ───────────────────────────────────────────────────────────
  # Fast evaluation: is this issue actionable by AI?
  # If not → agent emits STOKOWSKI:BLOCKED → moved to Blocked.
  # Uses Haiku for speed and cost — triage is a simple yes/no decision.
  triage:
    type: agent
    prompt: prompts/triage.md
    linear_state: active
    model: claude-haiku-4-5
    max_turns: 3                        # very few turns — just read and decide
    session: inherit
    transitions:
      complete: implement

  # ── 1. Implement ────────────────────────────────────────────────────────
  implement:
    type: agent
    prompt: prompts/implement.md
    linear_state: active
    model: claude-sonnet-4-6
    max_turns: 30
    session: inherit
    transitions:
      complete: review-push

  # ── 2. Review & Push ────────────────────────────────────────────────────
  review-push:
    type: agent
    prompt: prompts/review-push.md
    linear_state: active
    model: claude-opus-4-6              # Opus for adversarial review
    max_turns: 15
    session: fresh                      # clean perspective
    transitions:
      complete: fix-reviews

  # ── 3. Fix PR Reviews & Merge ──────────────────────────────────────────
  fix-reviews:
    type: agent
    prompt: prompts/fix-reviews.md
    linear_state: active
    model: claude-sonnet-4-6
    max_turns: 20
    session: fresh
    transitions:
      complete: done

  # ── 4. Done ─────────────────────────────────────────────────────────────
  done:
    type: terminal
    linear_state: terminal
