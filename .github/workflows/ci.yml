name: CI

on:
  pull_request:
    branches: [main]
  # release-please PRs are created by GITHUB_TOKEN, which doesn't trigger
  # pull_request workflows. This push trigger runs CI when release-please
  # pushes to its branch, satisfying the required "test" check on the PR.
  push:
    branches: [release-please--branches--main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[web,schedule]"
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v
