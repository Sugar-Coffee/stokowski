name: Release

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9 AM UTC
  workflow_dispatch: {}   # Manual trigger from GitHub Actions UI

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Run tests on the release PR branch so the required "test" check passes.
  # PRs created by GITHUB_TOKEN don't trigger pull_request workflows,
  # so we run tests here instead.
  test-release-pr:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.pr && !needs.release-please.outputs.release_created
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release-please--branches--main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[web,schedule]"
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

  auto-merge:
    runs-on: ubuntu-latest
    needs: [release-please, test-release-pr]
    if: needs.release-please.outputs.pr && !needs.release-please.outputs.release_created
    steps:
      - uses: actions/checkout@v4

      - name: Auto-merge release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          gh pr merge "$PR_NUMBER" --squash --admin
